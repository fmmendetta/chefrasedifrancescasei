<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your Message</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #f8e8ff, #e8f7ff);
  font-family: "Georgia", serif;
}

.card {
  background: white;
  width: 80%;
  max-width: 500px;
  padding: 40px 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  animation: fadeIn 0.8s ease;
}

.message {
  font-size: 28px;
  line-height: 1.4;
  color: #333;
}

.small {
  margin-top: 20px;
  font-size: 14px;
  color: #888;
  font-family: Arial, sans-serif;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="card">
  <div class="message" id="message"></div>
  <div class="small">✨ Your random message ✨</div>
</div>


<script>

const messages = [
  "Ma tutt'apposto?",
  "Godo tantissimo",
  "Adesso ascoltiamo Gigi?",
  "TUTTA VITA",
  "FOLLIA",
  "TOP AMOOOO",
  "Mannacc a tutt cos",
  "POLLO",
  "Ciao raggio di sole!",
  "FRASE RARA: T sfong o cranij!"
];


document.getElementById("message").textContent =
messages[Math.floor(Math.random() * messages.length)];

</script>

</body>
</html>

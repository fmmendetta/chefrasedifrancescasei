<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">

<title>Secret Message</title>

<style>

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #fff7d6, #fffaf0);
  font-family: "Poppins", sans-serif;
}

.container {
  text-align: center;
}


/* ENVELOPE */

.envelope {
  width: 320px;
  height: 210px;
  background: #f9e7a8;
  border-radius: 18px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 18px 40px rgba(150,120,40,0.18);
  overflow: hidden;
  transition: transform 0.3s ease;
}

.envelope:hover {
  transform: translateY(-5px);
}


/* FLAP */

.flap {
  position: absolute;
  width: 0;
  height: 0;
  border-left: 160px solid transparent;
  border-right: 160px solid transparent;
  border-top: 105px solid #f3d98b;
  top: 0;
  left: 0;
  transform-origin: top;
  transition: transform 0.8s ease;
  z-index: 2;
}


/* MESSAGE PAPER */

.paper {
  position: absolute;
  background: #fffdf8;
  width: 260px;
  min-height: 145px;
  left: 30px;
  top: 45px;

  border-radius: 12px;

  padding: 22px;
  box-sizing: border-box;

  opacity: 0;
  transform: translateY(60px);

  transition: all 0.8s ease;

  font-family: "Playfair Display", serif;
  font-size: 23px;
  line-height: 1.45;
  color: #5b5140;

  display: flex;
  align-items: center;
  justify-content: center;
}


/* OPEN EFFECT */

.open .flap {
  transform: rotateX(180deg);
}

.open .paper {
  opacity: 1;
  transform: translateY(-25px);
}


/* TEXT UNDER ENVELOPE */

.hint {
  margin-top: 28px;
  color: #9b8754;
  font-family: "Poppins", sans-serif;
  font-size: 14px;
  letter-spacing: 0.5px;
}


/* CONFETTI */

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: 50%;
  left: 50%;
  opacity: 0;
  pointer-events: none;
  animation: confettiFall 2.5s ease-out forwards;
}


@keyframes confettiFall {

  0% {
    opacity: 1;
    transform: translate(0,0) rotate(0deg);
  }

  100% {
    opacity: 0;
    transform: translate(var(--x), var(--y)) rotate(720deg);
  }

}

</style>

</head>


<body>


<div class="container">

  <div class="envelope" onclick="openEnvelope()">

    <div class="flap"></div>

    <div class="paper" id="message"></div>

  </div>


  <div class="hint">
    Tocca la busta ✉️
  </div>

</div>



<script>


const messages = [

  "Ma tutt'apposto?",

  "Godo tantissimo",

  "Adesso ascoltiamo Gigi?",

  "TUTTA VITA",

  "FOLLIA",

  "TOP AMOOOO",

  "Mannacc a tutt cos",

  "POLLO",

  "Ciao raggio di sole!",

  "FRASE RARA: T sfong o cranij!"

];



function openEnvelope() {

  const envelope = document.querySelector(".envelope");

  const message = document.getElementById("message");


  if (!envelope.classList.contains("open")) {


    message.textContent =
      messages[Math.floor(Math.random() * messages.length)];


    envelope.classList.add("open");


    createConfetti();


  }

}




function createConfetti() {


  const colors = [

    "#f9e7a8",
    "#f6c1cc",
    "#b8e0d2",
    "#cdb4db",
    "#ffd6a5"

  ];


  for (let i = 0; i < 40; i++) {


    const piece = document.createElement("div");


    piece.className = "confetti";


    piece.style.background =
      colors[Math.floor(Math.random() * colors.length)];


    piece.style.setProperty(
      "--x",
      `${(Math.random() - 0.5) * 500}px`
    );


    piece.style.setProperty(
      "--y",
      `${(Math.random() - 0.5) * 500}px`
    );


    document.body.appendChild(piece);



    setTimeout(() => {

      piece.remove();

    }, 2500);


  }

}


</script>


</body>
</html>
